<svg width="200" height="270" viewBox="0 0 200 270" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#86EFAC"/>
      <stop offset="100%" stop-color="#4ADE80"/>
    </linearGradient>
  </defs>
  
  <!-- Outer circle with gradient -->
  <circle cx="100" cy="100" r="95" fill="url(#greenGradient)" stroke="#15803D" stroke-width="4"/>
  
  <!-- Inner white circle -->
  <circle cx="100" cy="100" r="70" fill="white"/>
  
  <!-- Green pulse/heartbeat line -->
  <path d="M 40 100 L 65 100 L 75 80 L 85 120 L 95 100 L 100 95 L 105 100 L 115 80 L 125 120 L 135 100 L 160 100" stroke="#16A34A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Medical cross in rounded square -->
  <rect x="80" y="80" width="40" height="40" fill="#16A34A" rx="8"/>
  <rect x="98" y="88" width="4" height="24" fill="white" rx="1"/>
  <rect x="88" y="98" width="24" height="4" fill="white" rx="1"/>
  
  <!-- Text -->
  <text x="100" y="235" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="#15803D" text-anchor="middle">TN</text>
  <text x="100" y="255" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#15803D" text-anchor="middle" letter-spacing="2.5" style="font-variant: small-caps">CLINIC BOOKER</text>
</svg>